```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Gallery</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:black;
  font-family:'Outfit',sans-serif;
  color:white;
}

body{
  cursor:default;
}

/* BACKGROUND */
#bg{
  position:fixed;
  inset:0;
  z-index:0;
}

#bg img{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity 1.5s ease;
}

#bg img.active{
  opacity:1;
}

.overlay{
  position:absolute;
  inset:0;
  background:
  linear-gradient(
    to top,
    rgba(0,0,0,0.88) 0%,
    rgba(0,0,0,0.25) 45%,
    rgba(0,0,0,0.08) 100%
  );
}

/* GRAIN */
.grain{
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:0.03;
  z-index:2;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* TOP INFO */
#top{
  position:fixed;
  top:32px;
  left:32px;
  z-index:10;
}

#index{
  font-size:12px;
  letter-spacing:2px;
  opacity:.45;
  margin-bottom:6px;
}

#photo-name{
  font-size:14px;
  font-weight:300;
}

/* PLAYER */
#player{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:10;
  padding:32px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

/* TRACK */
#track-title{
  font-family:'Cormorant Garamond',serif;
  font-size:38px;
  font-weight:300;
  margin-bottom:4px;
}

#track-artist{
  font-size:12px;
  letter-spacing:2px;
  opacity:.5;
  text-transform:uppercase;
}

/* PROGRESS */
#progress-wrap{
  width:100%;
  height:2px;
  background:rgba(255,255,255,0.15);
  cursor:pointer;
}

#progress{
  width:0%;
  height:100%;
  background:white;
}

/* CONTROLS */
#controls{
  display:flex;
  align-items:center;
  gap:24px;
}

button{
  background:none;
  border:none;
  color:white;
  cursor:pointer;
  opacity:.7;
  transition:.2s;
}

button:hover{
  opacity:1;
}

#play-btn{
  width:54px;
  height:54px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
}

#playlist{
  position:fixed;
  right:32px;
  bottom:140px;
  width:280px;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:18px;
  z-index:20;
}

#playlist h3{
  font-size:11px;
  letter-spacing:3px;
  margin-bottom:14px;
  opacity:.4;
  text-transform:uppercase;
}

.track{
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
}

.track:hover{
  background:rgba(255,255,255,0.06);
}

.track.active{
  background:rgba(255,255,255,0.1);
}

.track-title{
  font-size:13px;
}

.track-artist{
  font-size:10px;
  opacity:.4;
  margin-top:2px;
}

audio{
  display:none;
}

@media(max-width:768px){

  #player{
    padding:20px;
  }

  #track-title{
    font-size:28px;
  }

  #playlist{
    left:20px;
    right:20px;
    width:auto;
    bottom:150px;
  }

}
</style>
</head>
<body>

<div id="bg"></div>
<div class="grain"></div>

<div id="top">
  <div id="index"></div>
  <div id="photo-name"></div>
</div>

<div id="playlist">
  <h3>Playlist</h3>
  <div id="playlist-items"></div>
</div>

<div id="player">

  <div>
    <div id="track-title">Loading...</div>
    <div id="track-artist"></div>
  </div>

  <div id="progress-wrap">
    <div id="progress"></div>
  </div>

  <div id="controls">

    <button onclick="prevTrack()">
      ◀
    </button>

    <button id="play-btn" onclick="togglePlay()">
      ▶
    </button>

    <button onclick="nextTrack()">
      ▶
    </button>

  </div>

</div>

<audio id="audio"></audio>

<script>

/* ───────────────────────── */
/* FIXED GALLERY */
/* ───────────────────────── */

const media = [

{
  name:"IMG_1435",
  url:"https://res.cloudinary.com/dmtdmife2/image/upload/q_auto/f_auto/v1779958917/IMG_1435_wnx0f3.jpg"
},

];


/* ───────────────────────── */
/* PLAYLIST */
/* ───────────────────────── */

const playlist = [

{
  title:"None Of My Business",
  artist:"Tinashe",
  url:"https://res.cloudinary.com/dmtdmife2/video/upload/q_auto/f_auto/v1779955584/None_Of_My_Business_fzfqru.mp3"
},

{
  title:"Focus",
  artist:"Allie X",
  url:"https://res.cloudinary.com/dmtdmife2/video/upload/q_auto/f_auto/v1779955476/Allie_X_Focus_Official_Lyric_Video_ytgrpn.mp3"
},

{
  title:"Stay",
  artist:"BANKS",
  url:"https://res.cloudinary.com/dmtdmife2/video/upload/q_auto/f_auto/v1779955476/BANKS_-_Stay_Official_Audio_rfja4v.mp3"
}

];

let currentMedia = 0;
let currentTrack = 0;
let isPlaying = false;

const bg = document.getElementById("bg");
const audio = document.getElementById("audio");

/* ───────────────────────── */
/* RENDER BACKGROUND */
/* ───────────────────────── */

function renderBackground(){

  bg.innerHTML = '';

  media.forEach((m,i)=>{

    const img = document.createElement('img');
    img.src = m.url;

    if(i===currentMedia){
      img.classList.add('active');
    }

    bg.appendChild(img);

  });

  const overlay = document.createElement('div');
  overlay.className='overlay';
  bg.appendChild(overlay);

  document.getElementById('index').innerText =
  `${currentMedia+1} / ${media.length}`;

  document.getElementById('photo-name').innerText =
  media[currentMedia].name;

}

renderBackground();

/* AUTO SLIDE */

setInterval(()=>{

  currentMedia++;

  if(currentMedia>=media.length){
    currentMedia=0;
  }

  renderBackground();

},8000);

/* ───────────────────────── */
/* PLAYLIST */
/* ───────────────────────── */

function renderPlaylist(){

  const wrap = document.getElementById('playlist-items');

  wrap.innerHTML='';

  playlist.forEach((track,i)=>{

    const div = document.createElement('div');

    div.className='track';

    if(i===currentTrack){
      div.classList.add('active');
    }

    div.innerHTML=`
      <div class="track-title">${track.title}</div>
      <div class="track-artist">${track.artist}</div>
    `;

    div.onclick=()=>{

      currentTrack=i;
      loadTrack();
      playAudio();

    };

    wrap.appendChild(div);

  });

}

renderPlaylist();

/* ───────────────────────── */
/* AUDIO */
/* ───────────────────────── */

function loadTrack(){

  const track = playlist[currentTrack];

  audio.src = track.url;

  document.getElementById('track-title').innerText =
  track.title;

  document.getElementById('track-artist').innerText =
  track.artist;

  renderPlaylist();

}

loadTrack();

function playAudio(){

  audio.play();

  isPlaying=true;

  document.getElementById('play-btn').innerText='❚❚';

}

function pauseAudio(){

  audio.pause();

  isPlaying=false;

  document.getElementById('play-btn').innerText='▶';

}

function togglePlay(){

  if(isPlaying){
    pauseAudio();
  }else{
    playAudio();
  }

}

function nextTrack(){

  currentTrack++;

  if(currentTrack>=playlist.length){
    currentTrack=0;
  }

  loadTrack();

  playAudio();

}

function prevTrack(){

  currentTrack--;

  if(currentTrack<0){
    currentTrack=playlist.length-1;
  }

  loadTrack();

  playAudio();

}

/* AUTO NEXT */

audio.addEventListener('ended',nextTrack);

/* PROGRESS */

audio.addEventListener('timeupdate',()=>{

  const progress =
  (audio.currentTime / audio.duration) * 100;

  document.getElementById('progress').style.width =
  progress + '%';

});

document.getElementById('progress-wrap')
.addEventListener('click',(e)=>{

  const rect =
  e.currentTarget.getBoundingClientRect();

  const ratio =
  (e.clientX - rect.left) / rect.width;

  audio.currentTime =
  ratio * audio.duration;

});

/* MOBILE AUTOPLAY FIX */

document.body.addEventListener('click',()=>{

  if(!isPlaying){

    playAudio();

  }

},{once:true});

</script>
</body>
</html>
```
