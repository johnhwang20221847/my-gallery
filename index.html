<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>johns-gallery</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:black;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* 배경 슬라이드 */
.background{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:1;
}

.slide{
  position:absolute;
  inset:0;

  width:100%;
  height:100%;

  background-size:cover;
  background-position:center;

  opacity:0;

  transition:opacity 2.5s ease;
}

.slide.active{
  opacity:1;
}

/* 오버레이 */
.overlay{
  position:relative;
  z-index:5;

  width:100%;
  height:100%;

  background:
  linear-gradient(
    to top,
    rgba(0,0,0,0.55),
    rgba(0,0,0,0.15),
    rgba(0,0,0,0.45)
  );

  display:flex;
  align-items:flex-end;

  padding:60px 40px;
}

/* 음악 정보 */
.music-info{
  color:white;
  max-width:90%;
}

.song-title{
  font-size:68px;
  font-weight:300;
  line-height:1;
  margin-bottom:14px;

  letter-spacing:-2px;
}

.artist{
  font-size:28px;
  letter-spacing:8px;
  opacity:0.75;
}

/* 플레이어 */
.player{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);

  z-index:20;

  display:flex;
  align-items:center;
  gap:24px;

  padding:18px 28px;

  border-radius:999px;

  background:rgba(20,20,20,0.38);
  backdrop-filter:blur(30px);
}

/* 버튼 */
.control-btn{
  width:58px;
  height:58px;

  border:none;
  border-radius:50%;

  background:rgba(255,255,255,0.08);

  color:white;
  font-size:20px;

  cursor:pointer;

  transition:0.25s ease;
}

.control-btn:hover{
  background:rgba(255,255,255,0.16);
}

.control-btn:active{
  transform:scale(0.92);
}

/* 플레이리스트 버튼 */
.playlist-toggle{
  position:absolute;
  top:32px;
  right:24px;
  z-index:30;

  width:50px;
  height:50px;

  border:none;
  border-radius:50%;

  background:rgba(15,15,15,0.45);
  backdrop-filter:blur(20px);

  color:white;
  font-size:20px;

  cursor:pointer;

  transition:0.25s ease;
}

.playlist-toggle:hover{
  background:rgba(255,255,255,0.12);
}

/* 플레이리스트 패널 */
.playlist-panel{
  position:absolute;
  top:95px;
  right:24px;

  width:320px;
  max-width:calc(100vw - 48px);

  padding:22px;

  border-radius:28px;

  background:rgba(20,20,20,0.38);
  backdrop-filter:blur(35px);

  z-index:25;

  opacity:0;
  visibility:hidden;
  transform:translateY(10px);

  transition:
    opacity 0.35s ease,
    transform 0.35s ease,
    visibility 0.35s;
}

.playlist-panel.show{
  opacity:1;
  visibility:visible;
  transform:translateY(0);
}

.playlist-title{
  color:rgba(255,255,255,0.55);
  font-size:13px;
  letter-spacing:6px;
  margin-bottom:18px;
}

.track{
  padding:16px 18px;
  border-radius:18px;
  margin-bottom:10px;

  cursor:pointer;

  transition:0.25s ease;
}

.track.active{
  background:rgba(255,255,255,0.12);
}

.track:hover{
  background:rgba(255,255,255,0.08);
}

.track-name{
  color:white;
  font-size:18px;
  margin-bottom:4px;
}

.track-artist{
  color:rgba(255,255,255,0.5);
  font-size:15px;
}

/* 모바일 */
@media(max-width:768px){

  .overlay{
    padding:40px 24px 140px;
  }

  .song-title{
    font-size:52px;
  }

  .artist{
    font-size:22px;
    letter-spacing:5px;
  }

  .player{
    bottom:26px;
    gap:16px;
    padding:14px 20px;
  }

  .control-btn{
    width:52px;
    height:52px;
    font-size:18px;
  }

  .playlist-toggle{
    top:24px;
    right:18px;

    width:44px;
    height:44px;
  }

  .playlist-panel{
    top:82px;
    right:18px;

    width:290px;
    padding:20px;
  }

}

</style>
</head>

<body>

<!-- 배경 이미지 -->
<div class="background">

  <div class="slide active"
    style="background-image:url('https://res.cloudinary.com/dmtdmife2/image/upload/q_auto/f_auto/v1779958917/IMG_1435_wnx0f3.jpg')">
  </div>

  <div class="slide"
    style="background-image:url('https://res.cloudinary.com/dmtdmife2/image/upload/q_auto/f_auto/v1779960651/IMG_1418_lcoov3.jpg')">
  </div>

  <div class="slide"
    style="background-image:url('https://res.cloudinary.com/dmtdmife2/image/upload/q_auto/f_auto/v1779959020/IMG_1544_appkrg.jpg')">
  </div>

    <div class="slide"
    style="background-image:url('https://res.cloudinary.com/dmtdmife2/image/upload/q_auto/f_auto/v1779962816/IMG_1493_hbq15k.jpg')">
  </div>

</div>

<!-- 플레이리스트 버튼 -->
<button class="playlist-toggle" id="playlistBtn">
  ♫
</button>

<!-- 플레이리스트 -->
<div class="playlist-panel" id="playlistPanel">

  <div class="playlist-title">
    PLAYLIST
  </div>

  <div class="track active" data-index="0">
    <div class="track-name">None Of My Business</div>
    <div class="track-artist">Tinashe</div>
  </div>

  <div class="track" data-index="1">
    <div class="track-name">Focus</div>
    <div class="track-artist">Allie X</div>
  </div>

  <div class="track" data-index="2">
    <div class="track-name">Stay</div>
    <div class="track-artist">BANKS</div>
  </div>

</div>

<!-- 메인 UI -->
<div class="overlay">

  <div class="music-info">

    <div class="song-title" id="songTitle">
      None Of My Business
    </div>

    <div class="artist" id="artistName">
      TINASHE
    </div>

  </div>

</div>

<!-- 플레이어 -->
<div class="player">

  <button class="control-btn" id="prevBtn">
    ‹
  </button>

  <button class="control-btn" id="playBtn">
    ▶
  </button>

  <button class="control-btn" id="nextBtn">
    ›
  </button>

</div>

<audio id="audio"></audio>

<script>

/* 음악 리스트 */
const playlist = [

  {
  title:"If Only",
  artist:"RAVEENA",
  src:"https://res.cloudinary.com/dmtdmife2/video/upload/q_auto/f_auto/v1779962474/Raveena_-_If_Only_shz1qe.mp3"
},
  
{
  title:"None Of My Business",
  artist:"TINASHE",
  src:"https://res.cloudinary.com/dmtdmife2/video/upload/q_auto/f_auto/v1779955584/None_Of_My_Business_fzfqru.mp3"
},

{
  title:"Focus",
  artist:"ALLIE X",
  src:"https://res.cloudinary.com/dmtdmife2/video/upload/q_auto/f_auto/v1779955476/Allie_X_Focus_Official_Lyric_Video_ytgrpn.mp3"
},

{
  title:"Stay",
  artist:"BANKS",
  src:"https://res.cloudinary.com/dmtdmife2/video/upload/q_auto/f_auto/v1779955476/BANKS_-_Stay_Official_Audio_rfja4v.mp3"
}

];

/* 요소 */
const audio = document.getElementById("audio");

const playBtn = document.getElementById("playBtn");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

const songTitle = document.getElementById("songTitle");
const artistName = document.getElementById("artistName");

const slides = document.querySelectorAll(".slide");
const tracks = document.querySelectorAll(".track");

const playlistBtn = document.getElementById("playlistBtn");
const playlistPanel = document.getElementById("playlistPanel");

/* 현재 인덱스 */
let current = 0;
let isPlaying = false;

/* 음악 불러오기 */
function loadSong(index){

  audio.src = playlist[index].src;

  songTitle.textContent = playlist[index].title;
  artistName.textContent = playlist[index].artist;

  tracks.forEach(track=>{
    track.classList.remove("active");
  });

  tracks[index].classList.add("active");

}

/* 배경 변경 */
function changeBackground(index){

  slides.forEach(slide=>{
    slide.classList.remove("active");
  });

  slides[index].classList.add("active");

}

/* 재생 */
function playSong(){

  audio.play();
  isPlaying = true;

  playBtn.innerHTML = "❚❚";

}

/* 정지 */
function pauseSong(){

  audio.pause();
  isPlaying = false;

  playBtn.innerHTML = "▶";

}

/* 플레이 버튼 */
playBtn.addEventListener("click", ()=>{

  if(isPlaying){
    pauseSong();
  }else{
    playSong();
  }

});

/* 다음곡 */
function nextSong(){

  current++;

  if(current >= playlist.length){
    current = 0;
  }

  loadSong(current);
  changeBackground(current);

  if(isPlaying){
    playSong();
  }

}

/* 이전곡 */
function prevSong(){

  current--;

  if(current < 0){
    current = playlist.length - 1;
  }

  loadSong(current);
  changeBackground(current);

  if(isPlaying){
    playSong();
  }

}

nextBtn.addEventListener("click", nextSong);
prevBtn.addEventListener("click", prevSong);

/* 음악 종료 시 자동 다음곡 */
audio.addEventListener("ended", nextSong);

/* 플레이리스트 클릭 */
tracks.forEach(track=>{

  track.addEventListener("click", ()=>{

    current = Number(track.dataset.index);

    loadSong(current);
    changeBackground(current);

    playSong();

  });

});

/* 플레이리스트 열기/닫기 */
playlistBtn.addEventListener("click", ()=>{

  playlistPanel.classList.toggle("show");

});

/* 바깥 클릭 시 닫기 */
document.addEventListener("click",(e)=>{

  if(
    !playlistPanel.contains(e.target) &&
    !playlistBtn.contains(e.target)
  ){
    playlistPanel.classList.remove("show");
  }

});

/* 자동 이미지 전환 */
setInterval(()=>{

  let next = current + 1;

  if(next >= slides.length){
    next = 0;
  }

  changeBackground(next);

},10000);

/* 최초 로드 */
loadSong(current);

</script>

</body>
</html>
